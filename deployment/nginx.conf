# /etc/nginx/sites-available/findme
server {
    listen 80;
    server_name findme.co.il www.findme.co.il;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name findme.co.il www.findme.co.il;

    ssl_certificate /etc/letsencrypt/live/findme.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/findme.co.il/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req zone=api burst=10 nodelay;

    # FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    # Frontend (served from S3/CloudFront — this is a fallback for local serving)
    location / {
        root /opt/findme/frontend/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        root /opt/findme/frontend/dist;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
