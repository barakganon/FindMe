# STATUS DEFINITIONS:
# ==================
# Epic Status:
#   - backlog: Epic not yet started
#   - in-progress: Epic actively being worked on
#   - done: All stories in epic completed
#
# Story Status:
#   - backlog: Story only exists in epic file
#   - ready-for-dev: Story file created, ready for development
#   - in-progress: Developer actively working on implementation
#   - review: Implementation complete, ready for review
#   - done: Story completed
#
# Retrospective Status:
#   - optional: Can be completed but not required
#   - done: Retrospective has been completed
#
# Story files in this directory are minimal stubs that POINT AT START_PROMPT.md.
# The actual implementation spec lives in START_PROMPT.md at the repo root —
# Phases 1–4 map 1:1 to Stories 1.2–1.4. This keeps START_PROMPT.md as the
# single source of truth for the deploy plan while still letting BMad's
# auto-discovery work (the workflow strictly requires <story_key>.md files
# to exist).
#
# For Stories 3.x and 4.x (post-launch code work), run /bmad-create-story
# normally — those generate full per-story specs because the multi-day code
# work justifies the ceremony.

