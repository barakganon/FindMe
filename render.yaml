# render.yaml — Render Blueprint for FindMe API
# Docs: https://render.com/docs/blueprint-spec
#
# NOTE: This file defines infrastructure shape only. No live deploy is
# performed by committing this file. Actual deploy requires connecting
# this repo to the Render dashboard and clicking "Apply Blueprint".
#
# Managed Redis (Key Value) and Postgres are NOT declared as first-class
# Render services here because pgvector support on Render Postgres is not
# guaranteed — the team uses an external Postgres instance with pgvector.
# DATABASE_URL and REDIS_URL must be wired in the Render dashboard as
# secret env vars (sync: false). See "Deploy notes" in the story doc.

services:
  - type: web
    name: findme-api
    # "docker" runtime tells Render to build from the repo's Dockerfile.
    runtime: docker
    dockerfilePath: ./Dockerfile   # relative to repo root
    dockerContext: .               # build context
    plan: standard                 # standard = 1 CPU / 2 GB RAM; bump to pro as needed
    region: frankfurt              # eu-central-1 — closest to Israel
    branch: master                 # production branch
    # /health is dependency-free (no DB/Redis) so a cold deploy doesn't fail the
    # health check before the DB is reachable. Use /api/admin/health for deeper
    # readiness checks from monitoring, not as the deploy gate.
    healthCheckPath: /health

    envVars:
      # ── Application ──────────────────────────────────────────────────────
      - key: APP_ENV
        value: production

      - key: LOG_LEVEL
        value: INFO

      # PORT is injected automatically by Render; listed here for visibility.
      # scripts/start.sh reads ${PORT:-8000}.
      # Do NOT override PORT — let Render manage it.

      # ── CORS ─────────────────────────────────────────────────────────────
      # Set to your production frontend URL(s), e.g. https://findme.app
      - key: CORS_ORIGINS
        sync: false   # set in Render dashboard

      # ── Database (external Postgres + pgvector) ───────────────────────────
      # Must be wired manually in the Render dashboard.
      # Render's native Postgres does not include pgvector; use an external
      # provider (e.g. Supabase, Neon, or a self-hosted instance on Render).
      - key: DATABASE_URL
        sync: false   # asyncpg URL: postgresql+asyncpg://user:pass@host/db

      - key: DATABASE_URL_SYNC
        sync: false   # psycopg2 URL for Alembic CLI: postgresql+psycopg2://...

      # ── Redis (Render Key Value or external) ─────────────────────────────
      # Option A — Render managed Key Value: create a "Key Value" service in
      #   the dashboard, then copy its Internal Redis URL here.
      # Option B — external Redis (e.g. Upstash): paste the TLS URL.
      - key: REDIS_URL
        sync: false   # redis://... or rediss://...

      - key: CELERY_BROKER_URL
        sync: false   # usually same as REDIS_URL

      - key: CELERY_RESULT_BACKEND
        sync: false   # redis://... db index 1 recommended

      # ── Gemini ────────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false   # secret — set in Render dashboard

      # ── Auth / OAuth ──────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false   # secret — generate with: openssl rand -hex 32

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # ── Cost guard ────────────────────────────────────────────────────────
      - key: PER_SESSION_COST_BUDGET_USD
        value: "0.50"

      - key: DAILY_COST_BUDGET_USD
        value: "20.0"

      # ── Rate limits ───────────────────────────────────────────────────────
      - key: CHAT_RATE_LIMIT
        value: "20/minute"

      - key: SEARCH_RATE_LIMIT
        value: "60/minute"

      # ── Abuse-surface caps ────────────────────────────────────────────────
      - key: MAX_REQUEST_BODY_BYTES
        value: "524288"   # 512 KiB

      - key: MAX_MESSAGE_LENGTH
        value: "2000"

      - key: MAX_HISTORY_ITEMS
        value: "50"

      # ── Cache TTLs (seconds) ──────────────────────────────────────────────
      - key: SEARCH_CACHE_TTL
        value: "300"

      - key: INTENT_CACHE_TTL
        value: "120"

      # ── Geocoding (optional) ──────────────────────────────────────────────
      - key: GOOGLE_MAPS_API_KEY
        sync: false   # only needed for run_geocoding script; can be blank
