# render.yaml — Render Blueprint for FindMe API
# Docs: https://render.com/docs/blueprint-spec
#
# NOTE: This file defines infrastructure shape only. No live deploy is
# performed by committing this file. Actual deploy requires connecting
# this repo to the Render dashboard and clicking "Apply Blueprint".
#
# pgvector note (corrected 2026-07-11): Render's native Postgres now
# supports pgvector for all databases created after 2026-02-05 (and
# retroactively for older ones via support). We use Render's own managed
# Postgres below instead of an external provider — see
# _bmad-output/planning-artifacts/6-1-pgvector-provider-comparison.md.
#
# Intended-vs-running note: this blueprint describes the INTENDED target
# (frankfurt region, standard plan). The currently-running findme-api
# service is on oregon/free (see 6-1-deploy-status.md) and was created by
# hand before this blueprint existed. Reconciling region/plan for the live
# service is a launch-time decision for Barak, not something applying this
# blueprint will silently change.

databases:
  - name: findme-db
    plan: standard      # 1 GB RAM / 10 GB storage — sized for ~135k vector(768) rows + ivfflat index
    region: frankfurt    # eu-central — closest to Israel; verify Postgres region parity before creating
    postgresMajorVersion: "16"
    # pgvector is enabled with: CREATE EXTENSION IF NOT EXISTS vector;
    # (run once via scripts/migrate_catalog.sh or manually — Render does not
    # auto-run this on database creation)

services:
  - type: keyvalue
    name: findme-kv
    plan: starter
    region: frankfurt
    ipAllowList: []      # internal-only access from findme-api

  - type: web
    name: findme-api
    # "docker" runtime tells Render to build from the repo's Dockerfile.
    runtime: docker
    dockerfilePath: ./Dockerfile   # relative to repo root
    dockerContext: .               # build context
    plan: standard                 # standard = 1 CPU / 2 GB RAM; bump to pro as needed
    region: frankfurt              # eu-central-1 — closest to Israel
    branch: master                 # production branch
    # /health is dependency-free (no DB/Redis) so a cold deploy doesn't fail the
    # health check before the DB is reachable. Use /api/admin/health for deeper
    # readiness checks from monitoring, not as the deploy gate.
    healthCheckPath: /health

    envVars:
      # ── Application ──────────────────────────────────────────────────────
      - key: APP_ENV
        value: production

      - key: LOG_LEVEL
        value: INFO

      # PORT is injected automatically by Render; listed here for visibility.
      # scripts/start.sh reads ${PORT:-8000}.
      # Do NOT override PORT — let Render manage it.

      # ── CORS ─────────────────────────────────────────────────────────────
      # Set to your production frontend URL(s), e.g. https://findme.app
      - key: CORS_ORIGINS
        sync: false   # set in Render dashboard

      # ── Database (Render-managed Postgres w/ pgvector, see findme-db above) ─
      - key: DATABASE_URL
        fromDatabase:
          name: findme-db
          property: connectionString   # asyncpg needs postgresql+asyncpg://; api/dependencies.py normalizes the scheme

      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: findme-db
          property: connectionString   # used as-is for psycopg2/Alembic CLI (postgresql:// scheme is fine there)

      # ── Redis (Render Key Value, see findme-kv above) ────────────────────
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: findme-kv
          property: connectionString

      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: findme-kv
          property: connectionString

      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: findme-kv
          property: connectionString   # consider a distinct db index in-app if needed; Render KV doesn't expose db-index selection here

      # ── Gemini ────────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false   # secret — set in Render dashboard

      # ── Auth / OAuth ──────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false   # secret — generate with: openssl rand -hex 32

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # ── Cost guard ────────────────────────────────────────────────────────
      - key: PER_SESSION_COST_BUDGET_USD
        value: "0.50"

      - key: DAILY_COST_BUDGET_USD
        value: "20.0"

      # ── Rate limits ───────────────────────────────────────────────────────
      - key: CHAT_RATE_LIMIT
        value: "20/minute"

      - key: SEARCH_RATE_LIMIT
        value: "60/minute"

      # ── Abuse-surface caps ────────────────────────────────────────────────
      - key: MAX_REQUEST_BODY_BYTES
        value: "524288"   # 512 KiB

      - key: MAX_MESSAGE_LENGTH
        value: "2000"

      - key: MAX_HISTORY_ITEMS
        value: "50"

      # ── Cache TTLs (seconds) ──────────────────────────────────────────────
      - key: SEARCH_CACHE_TTL
        value: "300"

      - key: INTENT_CACHE_TTL
        value: "120"

      # ── Geocoding (optional) ──────────────────────────────────────────────
      - key: GOOGLE_MAPS_API_KEY
        sync: false   # only needed for run_geocoding script; can be blank
